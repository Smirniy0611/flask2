    <script>
        function scrollToElement(id) {
            const element = document.getElementById(id);
            if (element) {
                // Плавная прокрутка
                element.scrollIntoView({
                    behavior: 'smooth' // Плавная анимация
                });
                // Альтернатива: прокрутка на фиксированное количество пикселей
                // window.scrollBy(0, 200); // Прокрутка на 200 пикселей вниз
            }
        }
        function toggleInput() {
    const checkbox = document.getElementById('elektr');
    const extraField = document.getElementById('elektr_2');

    // Если галочка стоит — показываем блок, если нет — скрываем
    extraField.style.display = checkbox.checked ? 'block' : 'none';
}
